<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2979ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="36" fill="url(#circle)" opacity="0.6"/>
  <!-- N letter shape -->
  <path d="M30 68 L30 35 L38 35 L54 57 L54 35 L62 35 L62 55" 
        stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chat bubble tail -->
  <path d="M28 72 Q26 80 20 82 Q30 80 36 75 Z" fill="white" opacity="0.9"/>
  <!-- Arrow up-right -->
  <path d="M58 45 L70 33 M63 33 L70 33 L70 40" 
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Circular arrow bottom -->
  <path d="M62 60 Q68 72 58 76 Q46 80 38 72" 
        stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M36 68 L38 73 L43 70" 
        stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
